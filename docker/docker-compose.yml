# ==============================================================================
# Doable — Docker Compose
# ==============================================================================
# Quick start:
#   cp docker/.env.example docker/.env   # then edit secrets
#   docker compose -f docker/docker-compose.yml up --build
#
# With Redis (optional, for multi-instance scaling):
#   Set REDIS_URL=redis://redis:6379 in docker/.env
#   docker compose -f docker/docker-compose.yml --profile redis up --build
#
# DB only:      docker compose -f docker/docker-compose.yml up postgres
# Rebuild:      docker compose -f docker/docker-compose.yml up --build
# ==============================================================================

services:
  # --- PostgreSQL with pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: doable-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doable_secret}
      POSTGRES_DB: ${POSTGRES_DB:-doable}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doable}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Run database migrations ---
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: migrate
    container_name: doable-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-doable}:${POSTGRES_PASSWORD:-doable_secret}@postgres:5432/${POSTGRES_DB:-doable}
    restart: "no"

  # --- API server (Hono) ---
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
    container_name: doable-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-doable}:${POSTGRES_PASSWORD:-doable_secret}@postgres:5432/${POSTGRES_DB:-doable}
      DATABASE_POOL_SIZE: 20
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in docker/.env}
      JWT_ISSUER: doable
      JWT_ACCESS_TOKEN_EXPIRES_IN: 15m
      JWT_REFRESH_TOKEN_EXPIRES_IN: 7d
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Set ENCRYPTION_KEY in docker/.env}
      API_PORT: 4000
      API_HOST: 0.0.0.0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      WS_PORT: 4001
      WS_HOST: 0.0.0.0
      INTERNAL_SECRET: ${INTERNAL_SECRET:?Set INTERNAL_SECRET in docker/.env}
      WS_INTERNAL_URL: http://ws:4001
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      NODE_ENV: production
      PROJECTS_ROOT: ./projects
      REDIS_URL: ${REDIS_URL:-}
    volumes:
      - api_projects:/app/services/api/projects
      - api_thumbnails:/app/services/api/thumbnails

  # --- WebSocket server (Yjs CRDT) ---
  ws:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: ws
    container_name: doable-ws
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-doable}:${POSTGRES_PASSWORD:-doable_secret}@postgres:5432/${POSTGRES_DB:-doable}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in docker/.env}
      WS_PORT: 4001
      WS_HOST: 0.0.0.0
      INTERNAL_SECRET: ${INTERNAL_SECRET:?Set INTERNAL_SECRET in docker/.env}
      API_URL: http://api:4000
      NODE_ENV: production
      REDIS_URL: ${REDIS_URL:-}
    volumes:
      - ws_projects:/app/services/ws/projects

  # --- Web frontend (Next.js) ---
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4001}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: doable-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
      - ws
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NODE_ENV: production

  # --- Redis (optional, enabled with --profile redis) ---
  redis:
    image: redis:7-alpine
    container_name: doable-redis
    profiles: ["redis"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  api_projects:
  api_thumbnails:
  ws_projects:
  redis_data:
