# ==============================================================================
# Doable — Docker Compose
# ==============================================================================
# Quick start:
#   ./deployment/docker/setup.sh       # generates deployment/docker/.env with strong random secrets
#   docker compose --env-file deployment/docker/.env up
#
# DB only:
#   docker compose --env-file deployment/docker/.env up postgres
#
# Rebuild:
#   docker compose --env-file deployment/docker/.env up --build
#
# All secrets MUST come from deployment/docker/.env (auto-generated by setup.sh). Compose
# uses the ${VAR:?required} syntax so an unset/empty secret aborts immediately
# rather than silently defaulting to a weak placeholder.
# ==============================================================================

services:
  # --- PostgreSQL with pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: doable-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — run ./deployment/docker/setup.sh to generate}
      POSTGRES_DB: ${POSTGRES_DB:-doable}
      # Password for the runtime-only doable_app role. 02-roles.sh reads this
      # at first volume init to CREATE the role; api+ws then connect as it.
      # Required so an operator who bypasses setup.sh can't silently end up
      # with api still using the superuser role.
      DOABLE_APP_PASSWORD: ${DOABLE_APP_PASSWORD:?DOABLE_APP_PASSWORD is required — run ./deployment/docker/setup.sh to generate}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # :ro so a compromised container can't rewrite the init scripts ahead
      # of the next `docker compose down/up` cycle. Renamed to 01-/02- so the
      # postgres entrypoint runs them in deterministic order: extensions
      # first, role grants second (grants assume CREATE EXTENSION already ran).
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./02-roles.sh:/docker-entrypoint-initdb.d/02-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doable}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Postgres entrypoint uses gosu to drop from root to the postgres user
    # on startup, which needs SETUID/SETGID; CHOWN/FOWNER/DAC_OVERRIDE are
    # used to fix permissions on the data volume on first run. Everything
    # else (NET_RAW, NET_ADMIN, SYS_*) is dropped.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

  # --- Run database migrations ---
  migrate:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: migrate
    container_name: doable-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Migrate uses the OWNER role (POSTGRES_USER=doable). DDL — CREATE TABLE,
      # ALTER, CREATE EXTENSION, ALTER DEFAULT PRIVILEGES — only runs here.
      # Runtime api+ws use doable_app (CRUD only). See 02-roles.sh.
      DATABASE_URL: postgres://${POSTGRES_USER:-doable}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-doable}
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # --- API server (Hono) ---
  api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: api
    container_name: doable-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      # Runtime connections use the non-superuser doable_app role created by
      # 02-roles.sh. The migrate service above keeps the owner role for DDL,
      # so api compromise → no DROP/ALTER/CREATE EXTENSION/ROLE escalation.
      DATABASE_URL: postgres://doable_app:${DOABLE_APP_PASSWORD:?DOABLE_APP_PASSWORD is required — run ./deployment/docker/setup.sh to generate}@postgres:5432/${POSTGRES_DB:-doable}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-20}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — run ./deployment/docker/setup.sh to generate}
      JWT_ISSUER: ${JWT_ISSUER:-doable}
      JWT_ACCESS_TOKEN_EXPIRES_IN: ${JWT_ACCESS_TOKEN_EXPIRES_IN:-15m}
      JWT_REFRESH_TOKEN_EXPIRES_IN: ${JWT_REFRESH_TOKEN_EXPIRES_IN:-7d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required — run ./deployment/docker/setup.sh to generate}
      # Envelope-crypto master key for AI provider / OAuth / Stripe secrets
      # stored via the setup wizard. Required — api refuses to boot without it.
      DOABLE_KEK: ${DOABLE_KEK:?DOABLE_KEK is required — run ./deployment/docker/setup.sh to generate}
      API_PORT: 4000
      # Inside Docker the service must bind 0.0.0.0 so the container port is
      # reachable. Host-side isolation is provided by the ports mapping
      # "127.0.0.1:4000:4000" — equivalent security to bare-metal 127.0.0.1.
      API_HOST: 0.0.0.0
      # Required — the API refuses to start without an explicit origin allowlist.
      # setup.sh writes this. An operator who bypasses setup.sh and `docker compose
      # up`s with a stale .env would otherwise inherit a localhost fallback that
      # opens the API to any process on the operator's workstation listening on
      # :3000.
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required — run ./deployment/docker/setup.sh, or set it to the public origin(s) e.g. "https://app.example.com"}
      WS_PORT: 4001
      WS_HOST: 0.0.0.0
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required — run ./deployment/docker/setup.sh to generate}
      WS_INTERNAL_URL: http://ws:4001
      API_URL: http://api:4000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
      PROJECTS_ROOT: ./projects
      # First-run bootstrap (single-use; auto-generated by ./deployment/docker/setup.sh)
      INSTALL_BOOTSTRAP_TOKEN: ${INSTALL_BOOTSTRAP_TOKEN:-}
      INSTALL_BOOTSTRAP_TOKEN_EXPIRES_AT: ${INSTALL_BOOTSTRAP_TOKEN_EXPIRES_AT:-}
      # Optional AI providers (operators set these via /setup wizard at runtime,
      # or export the env var BEFORE compose-up to pre-configure the wizard).
      # MINIMAX_API_KEY = first-boot seed for MiniMax M2.7 (BYOK custom path).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      # QA-only rate-limit kill switch — defaults unset.
      # When operators set RATE_LIMIT_DISABLED=true (QA test boxes only),
      # services/api/src/middleware/rate-limit.ts no-ops every rateLimiter()
      # so the full TC suite can run without 429 cascades. The middleware's
      # own fail-closed guard refuses to enable this when NODE_ENV=production,
      # so QA boxes must ALSO set NODE_ENV=development (or staging) in the
      # .env. The passthrough is here so admins don't have to edit compose.
      RATE_LIMIT_DISABLED: ${RATE_LIMIT_DISABLED:-}
      # AI subprocess sandbox (bubblewrap-backed jailedSpawn + vault.spawn).
      # The bwrap binary is installed in the api image, but enabling jailing
      # under Docker requires the container to also have `seccomp=unconfined`
      # because bwrap's `mount()` syscalls are blocked by Docker's default
      # seccomp profile even with CAP_SYS_ADMIN — failures look like
      #   bwrap: Failed to make / slave: Permission denied
      # and vault.spawn-wrapped vite hangs silently until the 90s readiness
      # timeout.
      #
      # OOB default = `off` everywhere so the api container can stay locked
      # down (cap_drop ALL + no-new-privileges + default seccomp). Two env
      # vars unfortunately control different layers and BOTH must be set:
      #   DOABLE_HARDENING        = builder.ts + vite-jail.ts (full|relaxed|off)
      #   DOABLE_HARDENING_LEVEL  = sandbox/orchestrator.ts  (off|dev|staging|prod)
      # Multi-tenant operators who want AI-process isolation should layer a
      # docker-compose.sandbox.yml override that flips both to on AND adds
      # `cap_add: [SYS_ADMIN]` + `security_opt: [seccomp=unconfined]`.
      DOABLE_HARDENING: ${DOABLE_HARDENING:-off}
      DOABLE_HARDENING_LEVEL: ${DOABLE_HARDENING_LEVEL:-off}
      DOABLE_SANDBOX_INSTALL: ${DOABLE_SANDBOX_INSTALL:-0}
    volumes:
      - api_projects:/app/services/api/projects
      - api_thumbnails:/app/services/api/thumbnails
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # NOTE: to enable the bwrap-backed AI sandbox above, the operator must
    # add: cap_add: [SYS_ADMIN] AND security_opt: [seccomp=unconfined].
    # Doing that opens the api container's syscall surface; only do it on
    # boxes that actually need multi-tenant AI subprocess isolation.

  # --- WebSocket server (Yjs CRDT) ---
  ws:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: ws
    container_name: doable-ws
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      # Same runtime role as api — CRUD only, no DDL. See 02-roles.sh.
      DATABASE_URL: postgres://doable_app:${DOABLE_APP_PASSWORD:?DOABLE_APP_PASSWORD is required — run ./deployment/docker/setup.sh to generate}@postgres:5432/${POSTGRES_DB:-doable}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      WS_PORT: 4001
      WS_HOST: 0.0.0.0
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
      API_URL: http://api:4000
      NODE_ENV: ${NODE_ENV:-production}
      # WebSocket origin allow-list — Yjs/HMR upgrades from any other origin
      # are rejected. Falls back to CORS_ORIGINS so an operator
      # who only sets the public-facing zone in CORS_ORIGINS doesn't end up
      # with a silently-broken collab + AI-trace stream.
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS:-${CORS_ORIGINS:-http://localhost:3000}}
      DOABLE_KEK: ${DOABLE_KEK:?DOABLE_KEK is required — run ./deployment/docker/setup.sh to generate}
      # yjs-document-manager defaults PROJECTS_ROOT to process.cwd()/projects
      # (= /app/projects in the ws container), which doesn't match the named
      # volume's mount target. Pin it explicitly so writes land in the volume
      # instead of failing EACCES on the unwritable /app dir.
      DOABLE_PROJECTS_DIR: /app/services/ws/projects
    volumes:
      - ws_projects:/app/services/ws/projects
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # --- Web frontend (Next.js) ---
  web:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
      target: web
    container_name: doable-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy
      ws:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # --- Caddy TLS terminator + reverse proxy ---
  # Cross-platform replacement for host-side nginx. Same image works on
  # Linux / macOS / Windows (Docker Desktop or WSL2). Operator runs ONE
  # script — setup.sh — which generates the cert via mkcert (host-side
  # install of local CA) and the Caddyfile, then Caddy in the container
  # terminates TLS and proxies to api/ws/web on the docker network.
  caddy:
    image: caddy:2-alpine
    container_name: doable-caddy
    restart: unless-stopped
    ports:
      # DOABLE_BIND_ADDR defaults to 127.0.0.1 for local installs (no
      # public exposure) and is set to 0.0.0.0 by setup.sh in DOMAIN
      # mode so Let's Encrypt's HTTP-01 challenge can reach :80 from
      # the internet. setup.sh writes this into .env.
      - "${DOABLE_BIND_ADDR:-127.0.0.1}:80:80"
      - "${DOABLE_BIND_ADDR:-127.0.0.1}:443:443"
    environment:
      # Site address Caddy listens on — defaults to "localhost" for
      # zero-config local installs. setup.sh sets this to the public
      # hostname for DOMAIN mode, or a LAN IP for HOST mode.
      DOABLE_SITE: ${DOABLE_SITE:-localhost}
      # TLS source: "internal" = Caddy's self-signed (not browser-trusted),
      # "/certs/cert.pem /certs/key.pem" = mkcert-issued (browser-trusted),
      # or an email = automatic Let's Encrypt for DOMAIN mode.
      DOABLE_TLS: ${DOABLE_TLS:-/certs/cert.pem /certs/key.pem}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      # Persistent ACME state for Let's Encrypt (cert renewals, account key)
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      ws:
        condition: service_healthy
      web:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Caddy needs CAP_NET_BIND_SERVICE to bind ports 80/443 inside the
    # container. Net effect under cap_drop ALL: just the one capability.
    cap_add:
      - NET_BIND_SERVICE

volumes:
  postgres_data:
  api_projects:
  api_thumbnails:
  ws_projects:
  caddy_data:
  caddy_config:
