services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: doable-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: doable
      POSTGRES_PASSWORD: doable_secret
      POSTGRES_DB: doable
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doable"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
